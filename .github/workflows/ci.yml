# .github/workflows/ci.yml
# Goal — CI Pipeline (Section 5, Testing Strategy)
#
# Runs on every push and PR to main.
# Matrix: Python 3.10 / 3.11 / 3.12
# Steps:
#   1. flake8 + ruff linting
#   2. mypy type checking
#   3. pytest unit + integration tests
#   4. Coverage report uploaded to Codecov
#   5. Hadolint for all Dockerfiles

name: PyGoat v2 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint (flake8 + ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install flake8 ruff mypy django-stubs djangorestframework-stubs

      - name: flake8
        run: flake8 core/ challenges/ playgrounds/ --max-line-length=100 --exclude=migrations

      - name: ruff
        run: ruff check core/ challenges/ playgrounds/ labs/

      - name: mypy
        run: mypy core/ challenges/ --ignore-missing-imports --strict-optional

  # ── Dockerfile linting ─────────────────────────────────────────────────────
  hadolint:
    name: Hadolint (Dockerfiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: error

  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       pygoat_test
          POSTGRES_USER:     pygoat
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --settings=pygoat.settings_test
        env:
          DATABASE_URL: postgres://pygoat:testpassword@localhost:5432/pygoat_test

      - name: Load challenge fixtures
        run: python manage.py loaddata challenges/fixtures/challenges.json --settings=pygoat.settings_test
        env:
          DATABASE_URL: postgres://pygoat:testpassword@localhost:5432/pygoat_test

      - name: pytest (unit + integration)
        run: |
          pytest core/ challenges/ playgrounds/ \
            --cov=core --cov=challenges --cov=playgrounds \
            --cov-report=xml --cov-report=term-missing \
            -v
        env:
          DATABASE_URL:    postgres://pygoat:testpassword@localhost:5432/pygoat_test
          DJANGO_SETTINGS_MODULE: pygoat.settings_test
          USE_DOCKER_SDK:  "False"
          LAB_HOST:        "127.0.0.1"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          name: pygoat-v2

  # ── End-to-End tests (Playwright) ──────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + Playwright
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          playwright install chromium --with-deps

      - name: Start Django dev server
        run: |
          python manage.py migrate --settings=pygoat.settings_test
          python manage.py runserver 0.0.0.0:8000 --settings=pygoat.settings_test &
          sleep 3
        env:
          DJANGO_SETTINGS_MODULE: pygoat.settings_test
          USE_DOCKER_SDK:         "False"

      - name: Run Playwright E2E tests
        run: pytest tests/e2e/ -v
        env:
          BASE_URL: "http://localhost:8000"

  # ── Lab microservice tests ─────────────────────────────────────────────────
  lab-tests:
    name: Lab Microservice Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lab dependencies
        run: pip install flask flask-sqlalchemy pytest requests

      - name: Test SQLi lab
        run: pytest labs/sqli/tests/ -v

      - name: Test SSTI lab
        run: pytest labs/ssti/tests/ -v

      - name: Test JWT lab
        run: pytest labs/jwt/tests/ -v
